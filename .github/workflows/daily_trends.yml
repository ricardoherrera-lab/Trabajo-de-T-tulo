name: Descargar Google Trends diario

on:
  schedule:
    - cron: '0 13 * * *'
  workflow_dispatch:

jobs:
  run-script:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Clonar repositorio
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Instalar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          pip install pytrends pandas matplotlib openpyxl

      - name: Ejecutar script 1
        run: python script_gt.py

      - name: Ejecutar script 2
        run: python script_gt_2.py

      - name: Verificar archivo generado
        run: |
          echo "=== Rama actual ==="
          git branch --show-current
          echo "=== Carpeta output ==="
          ls -la output/ || echo "No existe output"
          echo "=== Excels encontrados ==="
          find . -name "*.xlsx" -not -path './.git/*'
          echo "=== Git status antes del add ==="
          git status

  
      - name: Guardar en repositorio
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add output/*.xlsx

          echo "=== Archivos staged ==="
          git diff --cached --name-only

          git commit -m "Datos Google Trends $(date +'%Y-%m-%d')" || echo "Sin cambios para commit"

          git pull --rebase origin main
          git push origin main
          
      - name: Subir artifact
        uses: actions/upload-artifact@v4
        with:
          name: google-trends-files
          path: output/*.xlsx
