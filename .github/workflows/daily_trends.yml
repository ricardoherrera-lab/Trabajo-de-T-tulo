name: Descargar Google Trends diario

on:
  schedule:
    - cron: '0 13 * * *'
  workflow_dispatch:

jobs:
  run-script:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Clonar repositorio
        uses: actions/checkout@v4

      - name: Instalar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          pip install pytrends pandas matplotlib openpyxl

      - name: Ejecutar script
        run: python script_gt.py

      - name: Revisar archivos generados
        run: |
          echo "Ruta actual:"
          pwd
          echo "Archivos en el repo:"
          find . -maxdepth 3 -type f
          echo "Git status antes del add:"
          git status --ignored

      - name: Guardar archivo generado en el repo
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          echo "Git status después del add:"
          git status
          git commit -m "Actualizar datos Google Trends" || echo "Sin cambios para commit"
          git push

      - name: Subir artifact
        uses: actions/upload-artifact@v4
        with:
          name: google-trends-files
          path: "output/*.xlsx"
