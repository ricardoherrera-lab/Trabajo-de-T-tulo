name: Descargar Google Trends diario
on:
  schedule:
    - cron: '0 13 * * *'
  workflow_dispatch:

jobs:
  run-script:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Clonar repositorio
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Instalar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependencias
        run: pip install pytrends pandas matplotlib openpyxl

      - name: Ejecutar script
        run: python script_gt.py

      - name: Verificar archivo generado
        run: |
          echo "=== Contenido de output/ ==="
          ls -la output/ || echo "Carpeta output no existe"
          echo "=== Archivos xlsx en todo el repo ==="
          find . -name "*.xlsx" -not -path './.git/*'

      -       - name: Guardar en repositorio
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          echo "=== Rama actual ==="
          git branch --show-current

          git add output/*.xlsx

          echo "=== Archivos staged ==="
          git diff --cached --name-only

          git commit -m "Datos Google Trends $(date +'%Y-%m-%d')" || echo "Sin cambios"
          git push

      - name: Subir artifact
        uses: actions/upload-artifact@v4
        with:
          name: google-trends-files
          path: output/*.xlsx
